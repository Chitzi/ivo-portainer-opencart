name: Build OpenCart Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        default: latest
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: names
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OpenCart
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.names.outputs.owner }}/ivo-portainer-opencart:${{ steps.names.outputs.tag }}
            ghcr.io/${{ steps.names.outputs.owner }}/ivo-portainer-opencart:${{ github.sha }}

      - name: Build and push DB initializer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dbinit
          push: true
          tags: |
            ghcr.io/${{ steps.names.outputs.owner }}/ivo-portainer-opencart-dbinit:${{ steps.names.outputs.tag }}
            ghcr.io/${{ steps.names.outputs.owner }}/ivo-portainer-opencart-dbinit:${{ github.sha }}
